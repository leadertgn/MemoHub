name: MemoHub V2 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Print Code Format (Prettier)
        run: npx prettier --check . || echo "Prettier a trouvé des erreurs de formatage, mais on ne bloque pas encore le build."

      - name: Run Build
        run: npm run build
        env:
          VITE_API_URL: http://127.0.0.1:8000/api/v1  

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff
        run: |
          # Affiche les erreurs fatales (erreurs de syntaxe Python, imports inactifs)
          ruff check . --select=E9,F63,F7,F82 --output-format=github || echo "Erreurs de syntaxe trouvées"
